<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR.js Basic Example</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/AR-js-org/AR.js/3.3.2/aframe/build/aframe-ar.js"></script>
</head>
<body>
    <a-scene embedded arjs>
        <a-marker preset="hiro">
            <a-entity geometry="primitive: box; depth: 1; height: 1; width: 1;" material="color: yellow;"></a-entity>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
